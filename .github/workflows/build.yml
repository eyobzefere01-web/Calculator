name: Build for Multi-Platform Desktop

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0.0

jobs:

  # Compile it using Nuitka
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs essential tools and GUI system library headers to compile pywebview and Nuitka
      - name: Install Linux GUI Compilation Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            gobject-introspection \
            libgirepository-2.0-dev

      # Using 'python -m pip' explicitly everywhere ensures packages land in the active runner environment
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install nuitka pywebview imageio pillow

      # Nuitka's --windows-icon-from-ico needs a real .ico, not a .png
      - name: Convert icon to .ico (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -c "from PIL import Image; Image.open('static/ico/icons8-calculator-100.png').save('icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      # Compiles Windows .exe (Explicitly listing the target packages in a single line to ensure PowerShell works)
      - name: Compile with Nuitka (Windows)
        if: matrix.os == 'windows-latest'
        run: python -m nuitka --standalone --onefile --assume-yes-for-download --include-package=flask --include-package=werkzeug --include-package=jinja2 --include-package=click --include-package=itsdangerous --include-package=blinker --include-data-dir=templates=templates --include-data-dir=static=static --windows-icon-from-ico=icon.ico GUI.py

      # Compiles Linux Standalone Binary (Explicitly listing target packages without the windows icon flag)
      - name: Compile with Nuitka (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: python -m nuitka --standalone --onefile --assume-yes-for-download --include-package=flask --include-package=werkzeug --include-package=jinja2 --include-package=click --include-package=itsdangerous --include-package=blinker --include-data-dir=templates=templates --include-data-dir=static=static -o GUI.bin GUI.py

      # Packaging the Linux binary as a standalone Debian .deb package with system application icon configurations
      - name: Create Debian Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p package/usr/local/bin
          mkdir -p package/usr/share/pixmaps
          mkdir -p package/usr/share/applications
          mkdir -p package/DEBIAN

          cp GUI.bin package/usr/local/bin/calculator
          cp static/ico/icons8-calculator-100.png package/usr/share/pixmaps/calculator-icon.png

          cat <<EOF > package/usr/share/applications/calculator.desktop
          [Desktop Entry]
          Type=Application
          Version=1.0.0
          Name=Calculator
          Comment=Calculator local web application desktop interface
          Exec=/usr/local/bin/calculator
          Icon=calculator-icon
          Terminal=false
          Categories=Utility;Calculator;
          EOF

          cat <<EOF > package/DEBIAN/control
          Package: calculator
          Version: 1.0.0
          Section: custom
          Priority: optional
          Architecture: amd64
          Essential: no
          Maintainer: Eyob <eyobzefere01@gmail.com>
          Description: Calculator local web application desktop interface.
          EOF

          sed -i 's/^[ \t]*//' package/usr/share/applications/calculator.desktop
          sed -i 's/^[ \t]*//' package/DEBIAN/control

          dpkg-deb --build package calculator.deb

      - name: Upload Desktop Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: '*.exe'

      - name: Upload Desktop Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: '*.deb'