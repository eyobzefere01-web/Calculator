name: Build for Multi-Platform Desktop

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0.0

jobs:

  # Compile it using Nuitka
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash   # forces Git Bash on windows-latest too, so steps fail fast like Linux instead of silently continuing under pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Frees ~20-30GB on GitHub-hosted Ubuntu runners; onefile Nuitka builds
      # can otherwise run out of disk mid-compile and get silently canceled
      - name: Free up disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs essential tools and GUI system library headers to compile pywebview and Nuitka
      - name: Install Linux GUI Compilation Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          sudo